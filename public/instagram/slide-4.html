<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Slide 4 — Appel à l'action</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf8f0;
    --bg-alt: #f7f3eb;
    --text-dark: #2c1a0e;
    --text-brown: #78350f;
    --text-muted: #7a6550;
    --accent-orange: #ea580c;
    --accent-amber: #b45309;
    --accent-dark: #92400e;
    --dot-active: #ea580c;
    --dot-inactive: #d9cdb8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-dark);
  }

  .slide {
    width: 1080px;
    height: 1080px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 64px 80px 70px;
    gap: 36px;
    overflow: hidden;
  }

  .slide::before {
    content: '';
    position: absolute;
    top: -200px;
    right: -200px;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(234, 88, 12, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .title {
    font-family: 'Lora', serif;
    font-size: 52px;
    font-weight: 700;
    color: var(--text-brown);
    text-align: center;
    letter-spacing: 1px;
    z-index: 1;
  }

  /* CTA cards */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 24px;
    width: 100%;
    z-index: 1;
  }

  .cta-card {
    background: rgba(253, 248, 240, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(217, 205, 184, 0.6);
    border-radius: 24px;
    padding: 32px 40px;
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .cta-icon {
    font-size: 44px;
    flex-shrink: 0;
    width: 72px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 20px;
    background: var(--bg-alt);
  }

  .cta-text {
    flex: 1;
  }

  .cta-label {
    font-family: 'Lora', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--text-dark);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .cta-detail {
    font-size: 19px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* Instagram gradient badge */
  .ig-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    color: #fff;
    font-weight: 700;
    font-size: 18px;
    padding: 6px 16px;
    border-radius: 12px;
    margin-top: 4px;
  }

  .donate-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 15px;
    color: var(--accent-amber);
    font-weight: 600;
    margin-top: 4px;
  }

  /* Bottom section */
  .footer-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    z-index: 1;
    margin-top: auto;
    margin-bottom: 24px;
  }

  .logo {
    width: 80px;
    height: 80px;
    border-radius: 20px;
    object-fit: cover;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }

  .footer-title {
    font-family: 'Lora', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 2px;
  }

  /* Dots */
  .dots {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 1;
  }
  .dots .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--dot-inactive);
  }
  .dots .dot.active {
    background: var(--dot-active);
    width: 32px;
    border-radius: 6px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="title">REJOINS L'AVENTURE !</div>

  <div class="cards">
    <!-- Instagram -->
    <div class="cta-card">
      <div class="cta-icon">📷</div>
      <div class="cta-text">
        <div class="cta-label">SUIS LE VOYAGE</div>
        <div class="cta-detail">Chaque jour en direct sur Instagram</div>
        <div class="ig-badge">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
          @hugo_a_velo
        </div>
      </div>
    </div>

    <!-- Donation -->
    <div class="cta-card">
      <div class="cta-icon">💛</div>
      <div class="cta-text">
        <div class="cta-label">FAIS UN DON</div>
        <div class="cta-detail">100% des dons pour « Le Souci des Nôtres » via HelloAsso</div>
        <div class="donate-badge">🎁 Déductible à 66% des impôts</div>
      </div>
    </div>

    <!-- Share -->
    <div class="cta-card">
      <div class="cta-icon">🔄</div>
      <div class="cta-text">
        <div class="cta-label">PARTAGE CE POST</div>
        <div class="cta-detail">Chaque partage compte !</div>
      </div>
    </div>
  </div>

  <!-- Footer: logo + title -->
  <div class="footer-section">
    <img src="../logo-alfortville.jpeg" alt="US Alfortville Rugby" class="logo">
    <div class="footer-title">OBJECTIF MURRAYFIELD</div>
  </div>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot active"></div>
  </div>
</div>
</body>
</html>
