<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Slide 5 — Suivez l'aventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf8f0;
    --bg-alt: #f7f3eb;
    --text-dark: #2c1a0e;
    --text-brown: #78350f;
    --text-muted: #7a6550;
    --accent-orange: #ea580c;
    --accent-amber: #b45309;
    --accent-dark: #92400e;
    --dot-active: #ea580c;
    --dot-inactive: #d9cdb8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-dark);
  }

  .slide {
    width: 1080px;
    height: 1080px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 72px 80px 70px;
    gap: 36px;
    overflow: hidden;
  }

  .slide::before {
    content: '';
    position: absolute;
    top: -200px;
    right: -200px;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(234, 88, 12, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .title {
    font-family: 'Lora', serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--text-brown);
    text-align: center;
    letter-spacing: 2px;
    z-index: 1;
  }

  /* Glass cards */
  .follow-card {
    background: rgba(253, 248, 240, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(217, 205, 184, 0.6);
    border-radius: 24px;
    padding: 36px 44px;
    z-index: 1;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .follow-icon {
    width: 72px;
    height: 72px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .follow-icon.instagram {
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  }

  .follow-icon.website {
    background: linear-gradient(135deg, var(--accent-orange), var(--accent-amber));
  }

  .follow-text {
    flex: 1;
  }

  .follow-handle {
    font-family: 'Lora', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 6px;
  }

  .follow-desc {
    font-size: 20px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* Logos section */
  .logos-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    z-index: 1;
    margin-top: auto;
  }

  .logo-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .logo {
    width: 90px;
    height: 90px;
    border-radius: 22px;
    object-fit: cover;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }

  .logo-label {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 500;
    text-align: center;
    max-width: 140px;
    line-height: 1.3;
  }

  .footer-title {
    font-family: 'Lora', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 2px;
    z-index: 1;
    margin-bottom: 8px;
  }

  /* Dots */
  .dots {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 1;
  }
  .dots .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--dot-inactive);
  }
  .dots .dot.active {
    background: var(--dot-active);
    width: 32px;
    border-radius: 6px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="title">SUIVEZ L'AVENTURE</div>

  <!-- Instagram card -->
  <div class="follow-card">
    <div class="follow-icon instagram">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="white"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
    </div>
    <div class="follow-text">
      <div class="follow-handle">@hugo_a_velo</div>
      <div class="follow-desc">Suivez le voyage au jour le jour</div>
    </div>
  </div>

  <!-- Website card -->
  <div class="follow-card">
    <div class="follow-icon website">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
    </div>
    <div class="follow-text">
      <div class="follow-handle">objectif-murrayfield.vercel.app</div>
      <div class="follow-desc">Carte en direct, journal de bord, collecte</div>
    </div>
  </div>

  <!-- Logos -->
  <div class="logos-section">
    <div class="logo-item">
      <img src="../logo-alfortville.jpeg" alt="US Alfortville Rugby" class="logo">
      <span class="logo-label">US Alfortville Rugby</span>
    </div>
    <div class="logo-item">
      <img src="../logo-association.jpg" alt="Le Souci des Nôtres" class="logo">
      <span class="logo-label">Le Souci des Nôtres</span>
    </div>
  </div>

  <div class="footer-title">OBJECTIF MURRAYFIELD</div>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot active"></div>
  </div>
</div>
</body>
</html>
